# Redash インスタンス定義（デフォルトは REDASH_URL / REDASH_API_KEY 環境変数を使用）
redash_instances:
  - name: "default"
    url_env: "REDASH_URL"
    api_key_env: "REDASH_API_KEY"

# 調査定義（1件のクエリでも複数クエリでも同じ形式）
# timeout:               調査全体のタイムアウト (例: 60s, 2m)。Redash クエリ実行 + LLM 分析を含む合計時間。未指定は INVESTIGATION_TIMEOUT 環境変数を使用
# query_result_max_bytes: クエリ1件あたりの結果サイズ上限 (bytes)。未指定は QUERY_RESULT_MAX_BYTES 環境変数を使用。0 で無制限
# llm_input_max_bytes:    LLM への入力合計 (prompt + schema + documents + 全クエリ結果) のサイズ上限 (bytes)。未指定は LLM_INPUT_MAX_BYTES 環境変数を使用。0 で無制限
# documents:             LLM に追加情報として渡すドキュメントファイル (configs/documents/ 配下)。仕様書やシーケンス図など
# allowed_groups:        実行を許可するグループの環境変数名。値はカンマ区切りの Slack ユーザー ID。未指定または空の場合は全員拒否
# queries:              実行する Redash クエリ。required_parameters で指定したパラメータが Redash クエリの {{}} に渡される。
#                        Redash クエリ例:
#                          SELECT * FROM payments WHERE request_id = '{{request_id}}'
# resolve_parameters:    ユーザー入力パラメータから追加パラメータを解決するクエリ。
#                        例: request_id → payment_id, user_id を中間クエリで取得し、後続クエリで使用。
#                        query_id で Redash クエリを指定し、outputs で結果行の field をパラメータ名に対応付ける。
#                        Redash クエリ例 (1行目の値が使われる):
#                          SELECT payment_id, user_id FROM payments WHERE request_id = '{{request_id}}'
investigations:
  - name: "決済状況調査"
    description: "request_id に紐づく決済状況を総合的に調査"
    prompt: error_investigation.txt
    redash_instance: "default"
    timeout: "120s"
    query_result_max_bytes: 10000
    allowed_groups:
      - PAYMENT_TEAM_USERS
    schemas:
      - test_db.json
    parameters:
      - name: request_id
        type: string
        description: "リクエストID"
    queries:
      - id: 1
        name: "決済情報"
        description: "基本的な決済情報を取得"
        required_parameters:
          - request_id
      - id: 2
        name: "決済ログ"
        description: "決済処理のログを取得"
        required_parameters:
          - request_id
      - id: 3
        name: "エラー情報"
        description: "関連するエラー情報を取得"
        required_parameters:
          - request_id

  - name: "決済ステータス集計"
    description: "期間内の決済ステータスごとの件数と金額を集計"
    prompt: error_investigation.txt
    redash_instance: "default"
    timeout: "120s"
    query_result_max_bytes: 10000
    allowed_groups:
      - PAYMENT_TEAM_USERS
    schemas:
      - test_db.json
    parameters:
      - name: start_date
        type: date
        description: "開始日 (YYYY-MM-DD)"
      - name: end_date
        type: date
        description: "終了日 (YYYY-MM-DD)"
    queries:
      - id: 4
        name: "ステータス集計"
        description: "決済ステータスごとの件数と金額"
        required_parameters:
          - start_date
          - end_date

  - name: "システムステータス確認"
    description: "システムの稼働状況を確認（パラメータ不要）"
    prompt: error_investigation.txt
    redash_instance: "default"
    timeout: "120s"
    query_result_max_bytes: 10000
    allowed_groups:
      - PAYMENT_TEAM_USERS
    queries:
      - id: 5
        name: "システムステータス"
        description: "最新のシステムステータス"

  - name: "決済詳細調査"
    description: "request_id から payment_id と user_id を自動解決し、決済詳細とユーザー情報を取得"
    prompt: error_investigation.txt
    redash_instance: "default"
    timeout: "120s"
    query_result_max_bytes: 10000
    schemas:
      - test_db.json
    parameters:
      - name: request_id
        type: string
        description: "リクエストID"
    resolve_parameters:
      - name: "payment_id と user_id を解決"
        query_id: 6
        outputs:
          - name: payment_id
            field: payment_id
          - name: user_id
            field: user_id
    queries:
      - id: 7
        name: "決済詳細"
        description: "ゲートウェイの処理結果など詳細情報"
        required_parameters:
          - payment_id
      - id: 8
        name: "ユーザー情報"
        description: "決済者のユーザー情報"
        required_parameters:
          - user_id
