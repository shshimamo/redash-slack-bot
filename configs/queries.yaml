# 調査定義（1件のクエリでも複数クエリでも同じ形式）
investigations:
  - name: "決済状況調査"
    description: "request_id に紐づく決済状況を総合的に調査"
    schemas:
      - test_db.json
    parameters:
      - name: request_id
        type: string
        description: "リクエストID"
    queries:
      - id: 1
        name: "決済情報"
        description: "基本的な決済情報を取得"
        required_parameters:
          - request_id
      - id: 2
        name: "決済ログ"
        description: "決済処理のログを取得"
        required_parameters:
          - request_id
      - id: 3
        name: "エラー情報"
        description: "関連するエラー情報を取得"
        required_parameters:
          - request_id

  - name: "決済ステータス集計"
    description: "期間内の決済ステータスごとの件数と金額を集計"
    schemas:
      - test_db.json
    parameters:
      - name: start_date
        type: date
        description: "開始日 (YYYY-MM-DD)"
      - name: end_date
        type: date
        description: "終了日 (YYYY-MM-DD)"
    queries:
      - id: 4
        name: "ステータス集計"
        description: "決済ステータスごとの件数と金額"
        required_parameters:
          - start_date
          - end_date

  - name: "システムステータス確認"
    description: "システムの稼働状況を確認（パラメータ不要）"
    queries:
      - id: 5
        name: "システムステータス"
        description: "最新のシステムステータス"

  - name: "決済詳細調査"
    description: "request_id から payment_id と user_id を自動解決し、決済詳細とユーザー情報を取得"
    schemas:
      - test_db.json
    parameters:
      - name: request_id
        type: string
        description: "リクエストID"
    resolve_parameters:
      - name: "payment_id と user_id を解決"
        query_id: 6
        outputs:
          - name: payment_id
            field: payment_id
          - name: user_id
            field: user_id
    queries:
      - id: 7
        name: "決済詳細"
        description: "ゲートウェイの処理結果など詳細情報"
        required_parameters:
          - payment_id
      - id: 8
        name: "ユーザー情報"
        description: "決済者のユーザー情報"
        required_parameters:
          - user_id
